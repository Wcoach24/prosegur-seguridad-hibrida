<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prosegur — Seguridad Híbrida</title>
  <meta name="description" content="La fusión de personas y tecnología IA para proteger. Prosegur lidera la transformación de la seguridad a nivel global.">
  <meta property="og:title" content="Prosegur — Seguridad Híbrida">
  <meta property="og:description" content="Personas, tecnología y datos trabajando como un único sistema.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* Critical inline CSS — prevents FOUC flash before stylesheet loads */
    body.loading { background: #040810; overflow: hidden; margin: 0; }
    .preloader { position: fixed; inset: 0; z-index: 9999; background: #040810; display: flex; align-items: center; justify-content: center; }
    body.loading > *:not(.preloader) { visibility: hidden; }
  </style>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="https://res.cloudinary.com/dhuc2wmhp/image/upload/v1774345024/prosegur-favicon_xqkj3a.png" type="image/png">
  <script>
  // Preloader — runs immediately, before any external scripts
  (function () {
    'use strict';
    var preloader = document.getElementById('preloader');
    if (!preloader) return;

    var MIN_PRELOADER = 2500;
    var preloaderStart = performance.now();

    function revealHeroText() {
      var badge = document.querySelector('.hero-badge');
      if (badge) {
        badge.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
        badge.style.opacity = '1';
        badge.style.transform = 'translateY(0)';
      }
      var heroWords = document.querySelectorAll('.hero-title .word');
      heroWords.forEach(function(w, i) {
        setTimeout(function() { w.classList.add('revealed'); }, i * 200);
      });
      var heroSub = document.querySelector('.hero-sub');
      if (heroSub) {
        heroSub.style.opacity = '0';
        heroSub.style.transform = 'translateY(15px)';
        heroSub.style.transition = 'opacity 0.6s ease 0.6s, transform 0.6s ease 0.6s';
        requestAnimationFrame(function() {
          heroSub.style.opacity = '1';
          heroSub.style.transform = 'translateY(0)';
        });
      }
    }

    function hidePreloader() {
      preloader.classList.add('fade-out');
      document.body.classList.remove('loading');
      setTimeout(function() {
        preloader.style.display = 'none';
        revealHeroText();
      }, 600);
    }

    var loadPromise = new Promise(function(resolve) {
      if (document.readyState === 'complete') resolve();
      else window.addEventListener('load', resolve, { once: true });
    });
    var fontsPromise = document.fonts ? document.fonts.ready : Promise.resolve();

    Promise.all([loadPromise, fontsPromise]).then(function() {
      var elapsed = performance.now() - preloaderStart;
      var remaining = Math.max(0, MIN_PRELOADER - elapsed);
      setTimeout(hidePreloader, remaining);
    });

    // Safety fallback — hide preloader after 5s no matter what
    setTimeout(function() {
      if (!preloader.classList.contains('fade-out')) {
        hidePreloader();
      }
    }, 5000);

    // Ultimate fallback: if words aren't revealed after 7s, force reveal
    setTimeout(function() {
      document.querySelectorAll('.hero-title .word').forEach(function(w) {
        if (!w.classList.contains('revealed')) w.classList.add('revealed');
      });
    }, 7000);
  })();
  </script>
</head>
<body class="loading">
